name: Validate data

on:
  pull_request:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate list data
        run: python scripts/validate_data.py
